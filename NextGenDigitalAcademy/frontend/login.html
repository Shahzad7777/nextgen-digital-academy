<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - NextGen Digital Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="container nav-container">
      <a href="/" class="nav-logo">
        <span class="logo-icon">N</span>
        <span class="logo-text">NextGen <span class="accent">Academy</span></span>
      </a>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-card">
      <div class="text-center">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to access your courses and dashboard</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>

      <form class="auth-form active" id="loginForm" data-tab-content="login">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        <div class="form-status" id="loginStatus"></div>
      </form>

      <form class="auth-form" id="registerForm" data-tab-content="register">
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" name="name" required placeholder="Your full name">
        </div>
        <div class="form-group">
          <label for="regEmail">Email Address</label>
          <input type="email" id="regEmail" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="regPhone">Phone / WhatsApp</label>
          <input type="tel" id="regPhone" name="phone" placeholder="+92 3XX XXXXXXX">
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" name="password" required placeholder="Create a password" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        <div class="form-status" id="registerStatus"></div>
      </form>

      <div class="auth-footer">
        <a href="/">Back to Home</a>
      </div>
    </div>
  </section>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
